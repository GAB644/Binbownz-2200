<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../if/if.css" rel="stylesheet" type="text/css" /> <!-- windows 2000 just uses ies toolbars. so why not do the same -->
    <link href="index.css" rel="stylesheet" type="text/css" />
</head>
<body>
<div class="toolbars">
    <div class="toolbar1">
      <button style="width: 50px;">File</button>
      <button style="width: 50px;">Edit</button>
      <button style="width: 50px;">View</button>
      <button style="width: 50px;">Tools</button>
      <button style="width: 50px;">About</button>
      <img style="float:right;" src="..//if/logo.gif">
    </div>
    <div class="toolbar2">
        <button style="width: 60px;" id="backBtn"><img src="../../images/icons/if/back.png">Back</button>
        <button title="Up" id="upBtn"><img src="../../images/icons/explorer/up.png"></button>
        <img src="../../sep.png">
        <button style="width: 65px;" id="searchBtn"><img  src="../../images/icons/explorer/search.png">Search</button>
        <button style="width: 65px;" id="foldBtn"><img src="../../images/icons/explorer/folders.png">Folders</button>
        <img src="../../sep.png">
        <img src="../../images/icons/explorer/move to.png">
        <img src="../../images/icons/explorer/copy to.png">
        <button id="delBtn"><img src="../../images/icons/explorer/delete.png"></button>
        <button id="undoBtn"><img src="../../images/icons/explorer/undo.png"></button>
        <img src="../../sep.png">
        <button style="width: 31px;" id="viewBtn"><img src="../../images/icons/explorer/view.png"></button>
    </div>
    <div class="toolbar3">
      <p>Address</p>
      <input id="addressBar" type="text" name="address" size="55">
    </div>
</div>

</body>
</html>
